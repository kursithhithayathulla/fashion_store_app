<div class="relative group">

<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all placeholder:text-outline-variant text-on-surface" id="email" placeholder="name@fashion.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center mb-2 px-1">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-primary-fixed transition-all placeholder:text-outline-variant text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-secondary text-on-secondary rounded-xl font-bold text-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-secondary/20 mt-4" type="submit">
                            Sign In
                        </button>
