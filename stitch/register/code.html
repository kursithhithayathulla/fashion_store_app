<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aromas Fashion - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e8e8e8",
                        "primary-container": "#d4af37",
                        "primary-fixed": "#ffe088",
                        "on-background": "#1a1c1c",
                        "secondary-fixed": "#f0dfde",
                        "error": "#ba1a1a",
                        "on-surface": "#1a1c1c",
                        "surface-container": "#eeeeee",
                        "surface": "#f9f9f9",
                        "surface-variant": "#e2e2e2",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dadada",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#e9c349",
                        "tertiary": "#005bc0",
                        "on-primary-fixed-variant": "#574500",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#6c6060",
                        "background": "#f9f9f9",
                        "surface-bright": "#f9f9f9",
                        "on-primary-container": "#554300",
                        "surface-container-highest": "#e2e2e2",
                        "outline": "#7f7663",
                        "on-tertiary-fixed-variant": "#004493",
                        "on-primary-fixed": "#241a00",
                        "on-tertiary": "#ffffff",
                        "primary": "#735c00",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-container": "#eddcdb",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#adc7ff",
                        "tertiary-fixed": "#d8e2ff",
                        "tertiary-container": "#8db3ff",
                        "on-tertiary-container": "#004390",
                        "surface-tint": "#735c00",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "outline-variant": "#d0c5af",
                        "inverse-surface": "#2f3131",
                        "on-secondary-fixed-variant": "#4f4444",
                        "secondary-fixed-dim": "#d3c3c2",
                        "on-secondary-fixed": "#221919",
                        "on-surface-variant": "#4d4635",
                        "on-tertiary-fixed": "#001a41",
                        "secondary": "#685b5b",
                        "inverse-primary": "#e9c349"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-noto-serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center overflow-x-hidden px-6 py-12">
<div class="w-full max-w-md flex flex-col items-center">
<div class="mb-12 flex flex-col items-center space-y-2">
<h1 class="font-noto-serif italic text-5xl tracking-tighter text-secondary dark:text-stone-200">Aromas</h1>
<div class="h-1 w-12 bg-primary-container rounded-full mt-2"></div>
</div>
<div class="text-center mb-10">
<h2 class="font-noto-serif text-3xl font-bold text-on-background tracking-tight mb-2">Welcome to Aromas Fashion</h2>
<p class="font-body text-on-surface-variant/70 text-sm tracking-wide">Sign in to continue</p>
</div>
<form class="w-full space-y-5">
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline/60 text-[20px]">person</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary-container/30 transition-all font-body text-sm" placeholder="Full Name" type="text"/>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline/60 text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary-container/30 transition-all font-body text-sm" placeholder="Your Email" type="email"/>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline/60 text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary-container/30 transition-all font-body text-sm" placeholder="Password" type="password"/>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline/60 text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary-container/30 transition-all font-body text-sm" placeholder="Password Again" type="password"/>
</div>
<button class="w-full bg-secondary text-on-secondary font-bold py-4 rounded-xl shadow-[0px_12px_32px_rgba(104,91,91,0.15)] hover:opacity-90 transition-all active:scale-[0.98] mt-4 tracking-wider" type="submit">
                Sign Up
            </button>
</form>
<div class="mt-10 flex items-center justify-center space-x-1 font-body text-sm">
<span class="text-on-surface-variant/60">have a account?</span>
<a class="text-primary font-bold hover:underline decoration-primary-container underline-offset-4" href="#">Sign In</a>
</div>
</div>
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
